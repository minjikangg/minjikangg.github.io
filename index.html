<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
  <title>전직 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
      background: #e8e0d0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .rpg-wrap {
      background: #f5f0e8;
      border: 3px solid #b89a6e;
      border-radius: 4px;
      box-shadow:
        inset 0 0 0 2px #d4bfa0,
        inset 0 0 0 5px #e8dfc8,
        0 4px 20px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 520px;
      position: relative;
      overflow: hidden;
    }

    .corner-deco {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid #b89a6e;
      z-index: 2;
      pointer-events: none;
    }
    .corner-tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
    .corner-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
    .corner-br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

    .rpg-header {
      background: linear-gradient(180deg, #a08060 0%, #8a6e50 60%, #7a5e42 100%);
      text-align: center;
      padding: 13px 48px;
      position: relative;
      border-bottom: 2px solid #6a4e32;
    }

    .rpg-header h1 {
      color: #f5e8c8;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .rpg-header .close-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #d4b88a;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.8;
      line-height: 1;
      transition: opacity 0.15s;
    }
    .rpg-header .close-btn:hover { opacity: 1; }

    .rpg-body {
      padding: 16px 20px 12px;
      background: #f5f0e8;
    }

    .job-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .job-card {
      background: #faf7f0;
      border: 1px solid #c8aa80;
      border-radius: 3px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .job-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #a07840;
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .job-card:hover {
      background: #ede5d0;
      border-color: #a07840;
    }
    .job-card:hover::before { opacity: 1; }

    .job-icon {
      width: 36px;
      height: 36px;
      background: #e8dfc8;
      border: 1px solid #c0a070;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .job-info .job-name {
      font-size: 14px;
      font-weight: 700;
      color: #5a3e20;
      margin-bottom: 3px;
      letter-spacing: 1px;
    }

    .job-info .job-desc {
      font-size: 12px;
      color: #8a7060;
      line-height: 1.5;
    }

    .job-info .job-desc strong {
      color: #7a5030;
      font-weight: 700;
    }

    .rpg-footer {
      text-align: center;
      padding: 10px;
      border-top: 1px solid #c8aa80;
      background: #ede8dc;
    }

    .close-footer-btn {
      background: #a08060;
      color: #f5e8c8;
      border: 1px solid #7a5e40;
      border-radius: 3px;
      padding: 6px 32px;
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 2px 0 #5a3e20;
      transition: all 0.1s;
    }

    .close-footer-btn:hover {
      background: #8a6e50;
      box-shadow: 0 1px 0 #5a3e20;
      transform: translateY(1px);
    }

    .close-footer-btn:active {
      box-shadow: none;
      transform: translateY(2px);
    }
  </style>
</head>
<body>

  <div class="rpg-wrap">
    <div class="corner-deco corner-tl"></div>
    <div class="corner-deco corner-tr"></div>
    <div class="corner-deco corner-bl"></div>
    <div class="corner-deco corner-br"></div>

    <div class="rpg-header">
      <h1>⚔ 전직 가이드</h1>
      <span class="close-btn">✕</span>
    </div>

    <div class="rpg-body">
      <div class="job-list">

        <div class="job-card">
          <div class="job-icon">🗡️</div>
          <div class="job-info">
            <div class="job-name">소드맨</div>
            <div class="job-desc">크리투라 학원의 <strong>검사 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

        <div class="job-card">
          <div class="job-icon">🔮</div>
          <div class="job-info">
            <div class="job-name">매지션</div>
            <div class="job-desc">크리투라 학원의 <strong>마법사 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

        <div class="job-card">
          <div class="job-icon">🏹</div>
          <div class="job-info">
            <div class="job-name">아처</div>
            <div class="job-desc">크리투라 학원의 <strong>궁수 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

        <div class="job-card">
          <div class="job-icon">✨</div>
          <div class="job-info">
            <div class="job-name">어콜라이트</div>
            <div class="job-desc">크리투라 학원의 <strong>복사 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

        <div class="job-card">
          <div class="job-icon">💰</div>
          <div class="job-info">
            <div class="job-name">머챈트</div>
            <div class="job-desc">크리투라 학원의 <strong>상인 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

        <div class="job-card">
          <div class="job-icon">🗝️</div>
          <div class="job-info">
            <div class="job-name">씨프</div>
            <div class="job-desc">크리투라 학원의 <strong>도둑 길드</strong> 관계자를 만나보세요!</div>
          </div>
        </div>

      </div>
    </div>

    <div class="rpg-footer">
      <button class="close-footer-btn">닫기</button>
    </div>
  </div>

</body>
</html>
