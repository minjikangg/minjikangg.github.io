<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
  <title>전직 가이드</title>
  <style>
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #f0c040;
      margin-bottom: 24px;
      font-size: 1.6em;
    }
    .job-list {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .job-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .job-icon {
      font-size: 1.6em;
      width: 36px;
      text-align: center;
    }
    .job-info .job-name {
      font-weight: bold;
      color: #f0c040;
      font-size: 1em;
      margin-bottom: 4px;
    }
    .job-info .job-desc {
      font-size: 0.88em;
      color: #b0b8cc;
    }
  </style>
</head>
<body>
  <h1>⚔️ 전직 가이드</h1>
  <div class="job-list">
    <div class="job-card">
      <div class="job-icon">🗡️</div>
      <div class="job-info">
        <div class="job-name">소드맨</div>
        <div class="job-desc">크리투라 학원의 <strong>검사 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
    <div class="job-card">
      <div class="job-icon">🔮</div>
      <div class="job-info">
        <div class="job-name">매지션</div>
        <div class="job-desc">크리투라 학원의 <strong>마법사 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
    <div class="job-card">
      <div class="job-icon">🏹</div>
      <div class="job-info">
        <div class="job-name">아처</div>
        <div class="job-desc">크리투라 학원의 <strong>궁수 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
    <div class="job-card">
      <div class="job-icon">✨</div>
      <div class="job-info">
        <div class="job-name">어콜라이트</div>
        <div class="job-desc">크리투라 학원의 <strong>복사 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
    <div class="job-card">
      <div class="job-icon">💰</div>
      <div class="job-info">
        <div class="job-name">머챈트</div>
        <div class="job-desc">크리투라 학원의 <strong>상인 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
    <div class="job-card">
      <div class="job-icon">🗝️</div>
      <div class="job-info">
        <div class="job-name">씨프</div>
        <div class="job-desc">크리투라 학원의 <strong>도둑 길드</strong> 관계자를 만나보세요!</div>
      </div>
    </div>
  </div>
</body>
</html>
